name: Build OpenWrt Firmware

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 660x.config
  TZ: Asia/Shanghai
  DEVICE: lean660x
  UPLOAD_OUTPUT: true
  CCACHE_DIR: /workdir/openwrt/.ccache
  FILE_DATE: ${{ github.run_id }}
  TAG_NAME: "lean660x-${{ github.run_id }}"

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
    - name: 检查配置文件是否存在
      run: |
        if [ ! -f $GITHUB_WORKSPACE/${{ env.CONFIG_FILE }} ]; then
          echo "配置文件 ${{ env.CONFIG_FILE }} 不存在，退出！"
          exit 1
        fi

    - name: 克隆源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 配置环境
      run: |
        sudo mkdir -p -m 777 /workdir/openwrt/{dl,feeds,staging_dir}
        ln -s /workdir/openwrt/dl openwrt/dl
        ln -s /workdir/openwrt/feeds openwrt/feeds
        ln -s /workdir/openwrt/staging_dir openwrt/staging_dir

    - name: 恢复缓存
      uses: actions/cache@v3
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-openwrt-${{ env.DEVICE }}-ccache
        restore-keys: |
          ${{ runner.os }}-openwrt-${{ env.DEVICE }}-

    - name: 配置 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 修改 Lan IP 和修复版本
      run: |
        echo "【步骤5】修改 Lan IP 和修复版本"
        cd openwrt
        sed -i 's/192.168.1.1/192.168.0.1/g' package/base-files/files/bin/config_generate
        echo "已修改为 192.168.0.1，打印文件内容："
        grep 192.168.0.1 package/base-files/files/bin/config_generate || echo "未找到修改内容！"

    - name: 下载依赖
      run: |
        cp -f $GITHUB_WORKSPACE/${{ env.CONFIG_FILE }} $GITHUB_WORKSPACE/openwrt/.config
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        export CCACHE_DIR=${{ env.CCACHE_DIR }}
        export CC="ccache gcc"
        export CXX="ccache g++"
        make -j$(nproc) V=s

    - name: 上传编译结果
      uses: actions/upload-artifact@v3
      with:
        name: ${{ env.DEVICE }}-${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 发布固件至 Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ env.TAG_NAME }}
        name: "Release for ${{ env.DEVICE }} - ${{ env.FILE_DATE }}"
        artifacts: "openwrt/bin/targets/*/*/*"
        body: |
          ## 固件发布
          **设备**: ${{ env.DEVICE }}
          **生成时间**: ${{ env.FILE_DATE }}
        draft: false
        prerelease: false
